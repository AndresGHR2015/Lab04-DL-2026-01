experiments:
  - name: E00_real_only
    use_real: true
    use_traditional_aug: false
    use_cae: false
    use_vae: false
    use_gan: false

  - name: E01_real_traditional
    use_real: true
    use_traditional_aug: true
    use_cae: false
    use_vae: false
    use_gan: false

  - name: E02_real_cae
    use_real: true
    use_traditional_aug: false
    use_cae: true
    use_vae: false
    use_gan: false

  - name: E03_real_vae
    use_real: true
    use_traditional_aug: false
    use_cae: false
    use_vae: true
    use_gan: false

  - name: E04_real_gan
    use_real: true
    use_traditional_aug: false
    use_cae: false
    use_vae: false
    use_gan: true

  - name: E05_all
    use_real: true
    use_traditional_aug: true
    use_cae: true
    use_vae: true
    use_gan: true

  - name: E06_real_cae_vae
    use_real: true
    use_traditional_aug: false
    use_cae: true
    use_vae: true
    use_gan: false

  - name: E07_real_vae_gan
    use_real: true
    use_traditional_aug: false
    use_cae: false
    use_vae: true
    use_gan: true

hyperparameter_sweeps:
  - name: quick_multitask
    description: Barrido pequeño para estudiar pesos de pérdidas, learning rate y dropout.
    base_experiment: E00_real_only
    runs:
      - name: hp_lambda_age_05
        overrides:
          losses:
            lambda_gender: 1.0
            lambda_age: 0.5

      - name: hp_lambda_age_10
        overrides:
          losses:
            lambda_gender: 1.0
            lambda_age: 1.0

      - name: hp_lambda_age_20
        overrides:
          losses:
            lambda_gender: 1.0
            lambda_age: 2.0

      - name: hp_lr_0005_dropout_02
        overrides:
          training:
            learning_rate: 0.0005
          multitask_model:
            dropout: 0.2

      - name: hp_lr_001_dropout_05
        overrides:
          training:
            learning_rate: 0.001
          multitask_model:
            dropout: 0.5
